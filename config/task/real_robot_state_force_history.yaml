
suite_name: real_robot
benchmark_name: REAL_ROBOT_MULTI
mode: all
n_tasks: 10
demos_per_env: 50

task_embedding_format: clip
instruction_path: null
img_height: 224
img_width: 224
horizon: 600

shape_meta:
  action_dim: 7
  observation:
    rgb:
      front_cam:
        - 3
        - ${task.img_height}
        - ${task.img_width}
      right_wrist_cam:
        - 3
        - ${task.img_height}
        - ${task.img_width}
    lowdim:
      state: 13
      right_force_history: 60
  task:
    type: vector
    dim: 512

dataset:
  _target_: quest.utils.real_robot_utils.build_realworld_dataset
  data_prefix: ${data_prefix}
  seq_len: ${algo.dataset.seq_len}
  frame_stack: ${algo.dataset.frame_stack}
  obs_seq_len: ${algo.dataset.obs_seq_len}
  shape_meta: ${task.shape_meta}
  task_embedding_format: ${task.task_embedding_format}
  instruction_path: ${task.instruction_path}
  use_ft: ${oc.select:algo.dataset.use_ft,false}
  ft_config: ${oc.select:algo.dataset.ft_config,null}
  ft_shift: ${oc.select:algo.dataset.ft_shift,1}
  lowdim_stats_path: ${oc.select:algo.dataset.lowdim_stats_path,null}
  load_obs: ${training.load_obs}
